<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First steps</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Fireflies -->
    <div class="fireflies">
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-track"><div class="progress-fill"></div></div>

    <!-- Hero -->
    <header class="hero">
      <h1><em>First steps</em></h1>
      <p>A few set up for the dev to code stuff.</p>
      <p>Need a computer.</p>
      <p>Click on the image to view them big.</p>
    </header>

    <!-- Chapter Progress Overview (generated from chapters.js) -->
    <nav class="chapter-overview" aria-label="Chapter progress">
      <div class="overview-bar"></div>
    </nav>

    <!-- Chapters (generated from chapters.js) -->
    <main class="chapters"></main>

    <!-- Completion Banner -->
    <section class="completion-banner">
      <div class="completion-inner rpg-panel">
        <div class="hero-badge">DONE!</div>
        <p>Now the dev can code stuff for you</p>
      </div>
    </section>

    <!-- Lightbox Overlay -->
    <div class="lightbox-overlay">
      <button class="lightbox-close" aria-label="Close">&times;</button>
      <div class="lightbox-img-wrap">
        <img src="" alt="" />
      </div>
      <span class="lightbox-hint"
        >Scroll to zoom &middot; Drag to pan &middot; Click outside to
        close</span
      >
    </div>

    <script src="tutorial.js"></script>
    <script src="script.js"></script>
  </body>
</html>
